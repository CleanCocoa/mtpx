name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install pkg-config libmtp

      - name: Build
        run: swift build

      - name: Test
        run: swift test
